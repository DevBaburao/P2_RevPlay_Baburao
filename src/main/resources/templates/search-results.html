<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>RevPlay - Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .song-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #0d6efd;
        }

        .song-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .15) !important;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-music-note-beamed me-2"></i> RevPlay
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/albums}">Browse Albums</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/my-playlists}">My Playlists</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/liked-songs}">Liked Songs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/history}">History</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ARTIST')">
                        <a class="nav-link" th:href="@{/artist/dashboard}">Analytics</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ARTIST')">
                        <a class="nav-link" th:href="@{/my-albums}">My Albums</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ARTIST')">
                        <a class="nav-link" th:href="@{/my-songs}">My Songs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold text-white bg-secondary rounded px-2 ms-2" th:href="@{/profile}">My
                            Profile</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Advanced Search Section -->
    <div class="container mt-4 mb-4">
        <div class="card shadow-sm border-0 rounded-4 p-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-search me-2 text-primary"></i>Advanced Search</h5>
            <form th:action="@{/search}" method="get" class="row g-3 items-center">
                <div class="col-md-3">
                    <input type="text" name="keyword" class="form-control bg-light border-0"
                        placeholder="Search song title, artist..." th:value="${paramKeyword}">
                </div>
                <div class="col-md-2">
                    <select name="genre" class="form-select bg-light border-0">
                        <option value="">All Genres</option>
                        <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"
                            th:selected="${g.id == paramGenre}">Genre</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select name="artistId" class="form-select bg-light border-0">
                        <option value="">All Artists</option>
                        <option th:each="a : ${artists}" th:value="${a.id}"
                            th:text="${a.displayName != null ? a.displayName : a.username}"
                            th:selected="${a.id == paramArtistId}">Artist</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select name="albumId" class="form-select bg-light border-0">
                        <option value="">All Albums</option>
                        <option th:each="al : ${albums}" th:value="${al.id}" th:text="${al.name}"
                            th:selected="${al.id == paramAlbumId}">Album</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="number" name="year" class="form-control bg-light border-0"
                        placeholder="Year (e.g. 2023)" th:value="${paramYear}">
                </div>
                <div class="col-md-1 d-grid">
                    <button type="submit" class="btn btn-primary rounded-3"><i class="bi bi-search"></i></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Search Results -->
    <div class="container mb-5">
        <h3 class="fw-bold mb-4">Search Results <span class="badge bg-secondary fs-6 rounded-pill"
                th:text="${songs != null ? songs.size() : 0} + ' found'">0 found</span></h3>

        <div th:if="${songs == null or songs.isEmpty()}"
            class="alert alert-info border-0 shadow-sm rounded-4 text-center py-5">
            <i class="bi bi-search fs-1 text-info mb-3 d-block"></i>
            <h5 class="fw-bold text-dark">No matches found</h5>
            <p class="mb-0">Try adjusting your search criteria and filters.</p>
        </div>

        <div class="row g-4" th:if="${songs != null and !songs.isEmpty()}">
            <div th:each="song : ${songs}" class="col-md-6 col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 song-card h-100">
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary bg-opacity-10 rounded text-primary d-flex align-items-center justify-content-center me-3"
                                style="width: 50px; height: 50px;">
                                <i class="bi bi-music-note-beamed fs-3"></i>
                            </div>
                            <div>
                                <h5 class="card-title fw-bold mb-0 text-truncate" style="max-width: 200px;"
                                    th:text="${song.title}">Song Title</h5>
                                <a th:href="@{/artist/{username}(username=${song.artist.username})}"
                                    class="text-decoration-none text-muted small fw-semibold">
                                    <i class="bi bi-person-fill me-1"></i><span
                                        th:text="${song.artist.displayName != null ? song.artist.displayName : song.artist.username}">Artist
                                        Name</span>
                                </a>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-3 px-2 py-2 bg-light rounded align-items-center">
                            <small class="text-muted"><i class="bi bi-music-note-list me-1"></i><span
                                    th:text="${song.genre.name}">Genre</span></small>
                            <span class="badge bg-white text-dark border"><i class="bi bi-play-fill me-1"></i><span
                                    th:text="${song.playCount}">0</span></span>
                        </div>

                        <div th:if="${song.album != null}" class="mb-3 px-2">
                            <small class="text-muted"><i class="bi bi-disc me-1"></i>Album: <a
                                    th:href="@{/albums/{id}(id=${song.album.id})}"
                                    class="text-decoration-none fw-bold text-dark"
                                    th:text="${song.album.name}">Album</a></small>
                        </div>

                        <div class="mt-auto pt-3 border-top d-flex align-items-center justify-content-between">
                            <audio controls class="form-control-sm border-0 w-100 me-2" style="height: 30px;">
                                <source th:src="@{/songs/play/{id}(id=${song.id})}" type="audio/mpeg">
                            </audio>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
