<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>RevPlay - Browse Albums</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .album-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .15) !important;
        }

        .cover-img {
            height: 250px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-music-note-beamed me-2"></i> RevPlay
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Home</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" th:href="@{/albums}">Browse Albums</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/my-playlists}">Playlists</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/history}">History</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-info" th:href="@{/queue}">Queue</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ARTIST')">
                        <a class="nav-link" th:href="@{/artist/dashboard}">Analytics</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ARTIST')">
                        <a class="nav-link" th:href="@{/my-albums}">My Albums</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <a th:href="@{/profile}" class="btn btn-outline-light btn-sm me-3">My Profile</a>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <h2 class="fw-bold mb-0"><i class="bi bi-disc text-primary me-2"></i>Discover Albums</h2>
        </div>

        <div th:if="${albums == null or albums.empty}" class="text-center py-5">
            <i class="bi bi-emoji-frown text-muted" style="font-size: 3rem;"></i>
            <h4 class="mt-3 text-muted">No albums available yet.</h4>
            <p class="text-secondary">Check back later when artists publish new music!</p>
        </div>

        <div class="row g-4" th:if="${albums != null and !albums.empty}">
            <div class="col-sm-6 col-md-4 col-lg-3" th:each="album : ${albums}">
                <!-- Clickable card wrapper -->
                <a th:href="@{/albums/{id}(id=${album.id})}" class="text-decoration-none text-dark">
                    <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden album-card">
                        <div class="position-relative">
                            <img th:src="${album.coverImage != null ? album.coverImage : 'https://placehold.co/400?text=No+Cover'}"
                                class="card-img-top cover-img" alt="Album Cover">
                            <div class="position-absolute bottom-0 end-0 p-2">
                                <span class="badge bg-dark bg-opacity-75 rounded-pill shadow">
                                    <i class="bi bi-music-note-list me-1"></i> <span
                                        th:text="${album.songs.size()}">0</span>
                                </span>
                            </div>
                        </div>
                        <div class="card-body">
                            <h5 class="card-title fw-bold text-truncate mb-1" th:text="${album.name}">Album Name</h5>
                            <p class="card-text text-muted mb-2">
                                <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill">
                                    By <span th:text="${album.artist.displayName}">Artist</span>
                                </span>
                            </p>
                            <p class="card-text text-muted small mb-0">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span
                                    th:text="${album.releaseDate != null ? #temporals.format(album.releaseDate, 'yyyy') : 'Unreleased'}">Year</span>
                            </p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
