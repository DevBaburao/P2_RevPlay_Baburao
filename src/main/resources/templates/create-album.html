<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>RevPlay - Create Album</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-music-note-beamed me-2"></i> RevPlay
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" th:href="@{/my-albums}">My Albums</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/history}">History</a></li>
                </ul>
            </div>
            <div class="d-flex">
                <a th:href="@{/my-albums}" class="btn btn-outline-light btn-sm">Cancel</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5 d-flex justify-content-center">
        <div class="card shadow-sm border-0 rounded-4" style="max-width: 600px; width: 100%;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-disc-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Create New Album</h2>
                    <p class="text-muted">Fill out the details to officially document your next release.</p>
                </div>

                <form th:action="@{/albums/create}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Album Title *</label>
                        <input type="text" class="form-control form-control-lg rounded-3" id="name" name="name" required
                            placeholder="Enter album or EP title">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-semibold">Description / Liner Notes</label>
                        <textarea class="form-control rounded-3" id="description" name="description" rows="3"
                            placeholder="Tell your fans about this album..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="releaseDate" class="form-label fw-semibold">Release Date</label>
                        <input type="date" class="form-control form-control-lg rounded-3" id="releaseDate"
                            name="releaseDate">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Cover Artwork</label>
                        <div class="input-group">
                            <input type="file" class="form-control" name="coverImageFile"
                                accept="image/png, image/jpeg, image/webp">
                        </div>
                        <div class="form-text">For best results, upload a square image (minimum 500x500px).</div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Publish Album
                            Details</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</body>

</html>
