<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>RevPlay - Album Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .album-header {
            background: linear-gradient(135deg, #1f1f1f 0%, #3a3a3a 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .album-cover-large {
            width: 250px;
            height: 250px;
            object-fit: cover;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, .5) !important;
        }

        .song-row {
            transition: background-color 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .song-row:hover {
            background-color: #f8f9fa;
        }

        .play-btn {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .song-row:hover .play-btn {
            opacity: 1;
        }

        .track-number {
            width: 40px;
            text-align: center;
            color: #6c757d;
        }

        .song-row:hover .track-number {
            display: none;
        }

        .song-row:hover .play-icon-container {
            display: block !important;
        }

        .play-icon-container {
            display: none;
            width: 40px;
            text-align: center;
            color: #0d6efd;
            cursor: pointer;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-music-note-beamed me-2"></i> RevPlay
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" th:href="@{/albums}">Browse Albums</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/history}">History</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Album Header -->
    <div class="album-header">
        <div class="container">
            <div class="row align-items-end">
                <div class="col-md-auto text-center text-md-start mb-4 mb-md-0">
                    <img th:src="${album.coverImage != null ? album.coverImage : 'https://placehold.co/500?text=No+Cover'}"
                        class="album-cover-large rounded" alt="Album Cover">
                </div>
                <div class="col-md">
                    <span class="text-uppercase fw-bold text-white-50"
                        style="letter-spacing: 2px; font-size: 0.85rem;">Album</span>
                    <h1 class="display-3 fw-bold mb-1" th:text="${album.name}">Album Name</h1>

                    <div class="d-flex align-items-center mt-3">
                        <img th:src="${album.artist.profilePicture != null ? album.artist.profilePicture : 'https://ui-avatars.com/api/?name=' + album.artist.displayName}"
                            class="rounded-circle me-2" style="width: 32px; height: 32px; object-fit: cover;">
                        <span class="fs-5 fw-semibold me-2">
                            <a th:href="@{/artist/{username}(username=${album.artist.username})}"
                                class="text-white text-decoration-none hover-underline"
                                th:text="${album.artist.displayName}">Artist Name</a>
                        </span>
                        <span class="text-white-50 mx-2">•</span>
                        <span class="text-white-50"
                            th:text="${album.releaseDate != null ? #temporals.format(album.releaseDate, 'yyyy') : 'Unreleased'}">2023</span>
                        <span class="text-white-50 mx-2">•</span>
                        <span class="text-white-50" th:text="${songs.size() + ' songs'}">10 songs</span>
                    </div>

                    <p class="mt-3 text-white-50 fst-italic mb-0"
                        th:if="${album.description != null and !album.description.empty}"
                        th:text="${album.description}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tracklist Container -->
    <div class="container mb-5 pb-5">

        <div class="d-flex mb-4">
            <!-- If there are songs, the first play button could potentially play the first track, but for now we keep it simple -->
            <button
                class="btn btn-success rounded-circle shadow-lg d-flex align-items-center justify-content-center me-3"
                style="width: 65px; height: 65px;">
                <i class="bi bi-play-fill" style="font-size: 2.5rem; margin-left: 5px;"></i>
            </button>
            <button class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center"
                style="width: 65px; height: 65px;">
                <i class="bi bi-heart fs-4"></i>
            </button>
        </div>

        <!-- Tracklist Header -->
        <div class="row px-3 py-2 text-muted fw-bold border-bottom mb-2"
            style="font-size: 0.85rem; letter-spacing: 1px;">
            <div class="col-auto" style="width: 50px;">#</div>
            <div class="col">TITLE</div>
            <div class="col-2 text-end">PLAYS</div>
            <div class="col-1 text-center"><i class="bi bi-clock"></i></div>
            <div class="col-1 text-center"></div>
        </div>

        <!-- Tracks -->
        <div th:if="${songs.empty}" class="text-center py-5">
            <p class="text-muted">No tracks have been added to this album yet.</p>
        </div>

        <div class="song-row py-2 px-3 align-items-center row m-0 rounded" th:each="song, stat : ${songs}">
            <div class="col-auto d-flex align-items-center" style="width: 50px;">
                <div class="track-number" th:text="${stat.count}">1</div>
                <!-- Mini play button that appears on hover -->
                <div class="play-icon-container">
                    <a th:href="@{/songs/play/{id}(id=${song.id})}" class="text-primary"><i
                            class="bi bi-play-fill fs-4"></i></a>
                </div>
            </div>

            <div class="col">
                <div class="fw-bold text-dark mb-0" th:text="${song.title}">Song Title</div>
                <div class="text-muted small" th:text="${album.artist.displayName}">Artist</div>
            </div>

            <div class="col-2 text-end text-muted small" th:text="${song.playCount != null ? song.playCount : 0}">
                12,345
            </div>

            <div class="col-3 col-md-4 d-flex justify-content-end align-items-center">
                <!-- Inline Audio Player -->
                <audio controls class="form-control-sm border-0" style="height: 35px; width: 220px;">
                    <source th:src="@{/songs/play/{id}(id=${song.id})}" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div class="mt-5 text-muted small">
            <p>℗ <span
                    th:text="${album.releaseDate != null ? #temporals.format(album.releaseDate, 'yyyy') : '2023'}"></span>
                <span th:text="${album.artist.displayName}">Artist</span>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
