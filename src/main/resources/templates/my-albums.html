<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>RevPlay - My Albums</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .album-card {
            transition: transform 0.2s;
        }

        .album-card:hover {
            transform: translateY(-5px);
        }

        .cover-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-music-note-beamed me-2"></i> RevPlay
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/albums}">Browse Albums</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/history}">History</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/my-songs}">My Songs</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/artist/dashboard}">Analytics</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" th:href="@{/my-albums}">My Albums</a></li>
                    <li class="nav-item"><a class="nav-link text-white bg-secondary rounded px-2 ms-2"
                            th:href="@{/profile}">My Profile</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">My Albums</h2>
            <a th:href="@{/albums/create}" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-circle me-2"></i>Create New Album
            </a>
        </div>

        <div th:if="${albums == null or albums.empty}" class="text-center py-5">
            <i class="bi bi-vinyl text-muted" style="font-size: 4rem;"></i>
            <h4 class="mt-3 text-muted">You haven't created any albums yet.</h4>
            <p class="text-secondary">Group your tracks together into albums and EPs.</p>
            <a th:href="@{/albums/create}" class="btn btn-primary mt-2">Create First Album</a>
        </div>

        <div class="row g-4" th:if="${albums != null and !albums.empty}">
            <div class="col-md-4 col-lg-3" th:each="album : ${albums}">
                <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden album-card">
                    <img th:src="${album.coverImage != null ? album.coverImage : 'https://placehold.co/400?text=No+Cover'}"
                        class="card-img-top cover-img" alt="Album Cover">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-truncate" th:text="${album.name}">Album Name</h5>
                        <p class="card-text text-muted mb-1 small">
                            <i class="bi bi-calendar3 me-1"></i> <span
                                th:text="${album.releaseDate != null ? #temporals.format(album.releaseDate, 'yyyy-MM-dd') : 'Unreleased'}">Date</span>
                        </p>
                        <p class="card-text text-muted small">
                            <i class="bi bi-music-note-list me-1"></i>
                            <span th:with="activeCount=${album.songs.size()}">
                                <!-- The size check above includes deleted songs, this is a visual approximation for now -->
                                <span th:text="${activeCount} + ' tracks'">0 tracks</span>
                            </span>
                        </p>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-between pb-3">
                        <a th:href="@{/albums/edit/{id}(id=${album.id})}"
                            class="btn btn-outline-secondary btn-sm rounded-pill px-3">Edit</a>
                        <a th:href="@{/albums/delete/{id}(id=${album.id})}"
                            class="btn btn-outline-danger btn-sm rounded-pill px-3"
                            onclick="return confirm('Are you sure you want to delete this album? It cannot be undone.');">Delete</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
